<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>媽媽的專屬後台 - 作品上架</title>

<link rel="stylesheet" href="style.css">

<style>
  main { max-width: 600px; margin: 40px auto; padding: 0 20px; }
  h1 { color: #4E342E; text-align: center; margin-bottom: 30px; }

  .admin-card {
    background: #fff; padding: 30px; border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #8D6E63;
  }

  label { display: block; margin-bottom: 8px; font-weight: bold; color: #6D4C41; }

  input[type="text"], input[type="number"], input[type="email"], input[type="password"], textarea {
    width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #D7CCC8; 
    border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #FDFBF7;
  }

  /* 上傳照片的虛線框 */
  .image-upload-area {
    background: #FDFBF7; border: 2px dashed #8D6E63; border-radius: 8px;
    padding: 30px 20px; text-align: center; margin-bottom: 20px; cursor: pointer;
  }

  #preview {
    max-width: 100%; max-height: 250px; display: none;
    margin: 15px auto 0; border-radius: 8px; object-fit: cover;
  }

  /* 按鈕樣式 */
  button.submit-btn {
    background-color: #8D6E63; border: none; color: white;
    padding: 15px; border-radius: 30px; font-size: 1.1rem; font-weight: bold;
    cursor: pointer; width: 100%; transition: background 0.3s;
  }
  button.submit-btn:hover { background-color: #6D4C41; }

  /* 下方產品清單管理 */
  .list-title { color: #4E342E; margin: 50px 0 20px; font-size: 1.2rem; text-align: center; }

  .admin-product-item {
    background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #EFEBE9;
  }

  .product-info-mini { display: flex; align-items: center; }
  .product-info-mini img {
    width: 60px; height: 60px; object-fit: cover; border-radius: 6px; margin-right: 15px;
  }

  .delete-btn {
    background: #fff; color: #D84315; border: 1px solid #D84315; 
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
  }
  .delete-btn:hover { background: #D84315; color: #fff; }

  /* 登入區塊專用 */
  #loginSection { display: block; }
  #adminSection { display: none; }
</style>
</head>
<body>

<header style="padding: 15px; background: #EFEBE9; text-align: center;">
  <h2 style="margin: 0; color: #4E342E;">工作室管理後台</h2>
</header>

<main>
  <div id="loginSection" class="admin-card">
    <h2 style="text-align: center; color: #4E342E;">請先登入</h2>
    <p style="text-align: center; color: #8D6E63; margin-bottom: 20px;">請輸入媽媽專屬的帳號密碼</p>
    
    <label>登入帳號 (Email)</label>
    <input type="email" id="emailInput" placeholder="請輸入帳號">
    
    <label>密碼</label>
    <input type="password" id="passwordInput" placeholder="請輸入密碼">
    
    <button class="submit-btn" onclick="login()">登入後台</button>
  </div>

  <div id="adminSection">
    <div style="text-align: right; margin-bottom: 20px;">
      <button onclick="logout()" style="background:none; border:none; color:#8D6E63; text-decoration:underline; cursor:pointer;">登出</button>
    </div>

    <h1>發佈新作品</h1>
    <div class="admin-card">
      <div class="image-upload-area" onclick="document.getElementById('fileBtn').click()">
        <label style="cursor: pointer; color: #8D6E63; margin-bottom: 0;">📸 點擊這裡拍照或選擇照片</label>
        <input type="file" id="fileBtn" accept="image/*" style="display: none;">
        <img id="preview" src="" alt="預覽圖">
      </div>

      <label>作品名稱</label>
      <input type="text" id="pName" placeholder="例如：日系碎花托特包">
      
      <label>價格 (台幣)</label>
      <input type="number" id="pPrice" placeholder="請輸入純數字，例如：450">
      
      <label>作品介紹</label>
      <textarea id="pDesc" rows="4" placeholder="例如：純棉材質，內有三個暗袋，適合外出採買使用喔！"></textarea>
      
      <button id="uploadBtn" class="submit-btn" onclick="processAndUpload()">上傳發佈！</button>
    </div>

    <h2 class="list-title">目前架上的作品 (點擊垃圾桶可下架)</h2>
    <div id="adminProductList">
      <p style="text-align:center; color:#8D6E63;">載入中...</p>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAK7QVkeFUCWryls-ooFPcA5Z7Zr5PeQAg",
    authDomain: "bagggg-f9088.firebaseapp.com",
    projectId: "bagggg-f9088",
    storageBucket: "bagggg-f9088.firebasestorage.app",
    messagingSenderId: "951657039312",
    appId: "1:951657039312:web:69fd0b25a7b516fb08a5d5"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();
  const auth = firebase.auth(); // 啟用驗證功能

  // 檢查登入狀態：如果已經登入，就直接顯示管理畫面
  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('adminSection').style.display = 'block';
      loadProducts(); // 登入成功才去抓資料
    } else {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('adminSection').style.display = 'none';
    }
  });

  // 登入功能
  function login() {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    
    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        alert("登入成功！");
      })
      .catch((error) => {
        alert("登入失敗，請檢查帳號密碼是否正確。");
        console.error(error);
      });
  }

  // 登出功能
  function logout() {
    auth.signOut().then(() => {
      alert("已登出");
    });
  }

  // --- 下面是原本的上傳與刪除功能，維持不變 ---

  document.getElementById('fileBtn').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.getElementById('preview');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  function processAndUpload() {
    const fileInput = document.getElementById('fileBtn');
    const name = document.getElementById('pName').value.trim();
    const price = document.getElementById('pPrice').value.trim();
    const desc = document.getElementById('pDesc').value.trim();
    const btn = document.getElementById('uploadBtn');

    if (!fileInput.files[0] || !name || !price) {
      alert("⚠️ 媽媽，記得要填寫「作品名稱」、「價格」，並「選照片」喔！");
      return;
    }

    btn.disabled = true;
    btn.innerText = "上傳中，請稍候...";

    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const MAX_WIDTH = 600;
        if (width > MAX_WIDTH) {
          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

        db.collection('products').add({
          name: name,
          price: Number(price),
          description: desc,
          imageUrl: dataUrl,
          createdAt: new Date()
        }).then(() => {
          alert("🎉 耶！作品上架成功！");
          location.reload(); 
        }).catch(e => {
          console.error(e);
          alert("上傳失敗，請檢查網路連線");
          btn.disabled = false;
          btn.innerText = "上傳發佈！";
        });
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(fileInput.files[0]);
  }

  function loadProducts() {
    const listContainer = document.getElementById('adminProductList');
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot((querySnapshot) => {
      listContainer.innerHTML = '';
      if (querySnapshot.empty) {
        listContainer.innerHTML = '<p style="text-align:center; color:#999;">目前架上沒有作品喔。</p>';
        return;
      }
      querySnapshot.forEach((doc) => {
        const p = doc.data();
        const id = doc.id;
        const html = `
          <div class="admin-product-item">
            <div class="product-info-mini">
              <img src="${p.imageUrl}">
              <div>
                <strong style="color:#4E342E;">${p.name}</strong><br>
                <small style="color:#D84315;">NT$ ${p.price}</small>
              </div>
            </div>
            <button class="delete-btn" onclick="deleteProduct('${id}', '${p.name}')">🗑️ 刪除</button>
          </div>
        `;
        listContainer.innerHTML += html;
      });
    });
  }

  function deleteProduct(id, name) {
    if (confirm(`確定要把「${name}」下架刪除嗎？`)) {
      db.collection('products').doc(id).delete().then(() => {
        alert("✅ 已成功下架！");
      }).catch(e => {
        alert("刪除失敗，請再試一次。");
      });
    }
  }
</script>
</body>
</html>
