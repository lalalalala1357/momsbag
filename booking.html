<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>線上預約 | 手作縫紉工作室</title>

<link rel="stylesheet" href="style.css">

<style>
  .booking-wrapper {
    max-width: 800px;
    margin: 40px auto;
    background: #fff;
    padding: 50px 30px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    text-align: center;
  }

  h1 {
    color: #4E342E;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #795548;
    margin-bottom: 40px;
    font-size: 1.1rem;
    line-height: 1.6;
  }

  /* 步驟區塊設計 */
  .steps-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 40px;
    justify-content: center;
  }

  .step-box {
    flex: 1 1 200px;
    background: #FDFBF7;
    border: 2px dashed #D7CCC8;
    padding: 30px 20px;
    border-radius: 15px;
    position: relative;
  }

  .step-number {
    background: #8D6E63;
    color: #fff;
    width: 30px;
    height: 30px;
    line-height: 30px;
    border-radius: 50%;
    font-weight: bold;
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
  }

  .step-box h3 {
    color: #4E342E;
    margin-top: 10px;
    margin-bottom: 10px;
  }

  .step-box p {
    color: #6D4C41;
    font-size: 0.95rem;
    margin: 0;
    line-height: 1.5;
  }

  /* LINE 按鈕大特寫 */
  .line-cta-area {
    background: #EFEBE9;
    padding: 40px 20px;
    border-radius: 15px;
    margin-top: 20px;
  }

  .btn-line-huge {
    display: inline-block;
    background: #06C755; /* LINE 的官方綠色 */
    color: #fff;
    font-size: 1.2rem;
    font-weight: bold;
    padding: 15px 40px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);
    transition: 0.3s;
  }

  .btn-line-huge:hover {
    background: #05A346;
    transform: translateY(-3px);
  }

  .notice {
    margin-top: 20px;
    font-size: 0.9rem;
    color: #8D6E63;
  }
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main>
  <div class="booking-wrapper">
    <h1>一對一專屬討論與預約</h1>
    <p class="subtitle">為了給您最精準的報價與最好的服務品質，<br>我們全面採用 LINE 官方帳號進行客製化溝通喔！</p>

    <div class="steps-container">
      <div class="step-box">
        <div class="step-number">1</div>
        <h3>📷 拍下照片</h3>
        <p>拍下您需要修改的衣物部位，或是準備好想訂製的包包參考圖片。</p>
      </div>
      <div class="step-box">
        <div class="step-number">2</div>
        <h3>💬 加入 LINE</h3>
        <p>點擊下方按鈕加入媽媽的專屬 LINE 官方帳號。</p>
      </div>
      <div class="step-box">
        <div class="step-number">3</div>
        <h3>✨ 確認報價</h3>
        <p>傳送照片並簡單說明需求，我們會盡快回覆您報價與所需工作天數！</p>
      </div>
    </div>

    <div class="line-cta-area">
      <h3 style="color: #4E342E; margin-top: 0; margin-bottom: 20px;">準備好要跟媽媽聊聊了嗎？</h3>
      
      <a href="https://line.me/R/ti/p/@130xhbqv" target="_blank" class="btn-line-huge">
        加入 LINE 官方帳號
      </a>
      
      <p class="notice">
        🕒 工作室回覆時間：週一至週五 18:00 - 22:00<br>
        (白天媽媽有正職工作，訊息會在下班後依序用心回覆，感謝您的耐心等待！)
      </p>
    </div>

  </div>
</main>

<div id="footer-placeholder"></div>

<script src="navbar.js"></script>
<script src="footer.js"></script>

</body>
</html>
