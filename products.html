<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>手作成品 | 手作縫紉工作室</title>

<link rel="stylesheet" href="style.css">

<style>
  main { 
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px; 
  }
  
  h1 { color: #4E342E; margin-bottom: 10px; text-align: center; }
  .page-desc { text-align: center; color: #795548; margin-bottom: 40px; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
  }

  .product-card {
    background: white; border-radius: 15px; overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: transform 0.3s; display: flex; flex-direction: column;
  }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  
  /* --- 👇 這裡做了修改以適應 3024*4032 的直式照片 --- */
  .product-img { 
    width: 100%; 
    /* 1. 移除了原本的 height: 250px; */
    
    /* 2. 強制圖片區塊維持直式的 3:4 比例 (與 3024*4032 相同) */
    aspect-ratio: 3 / 4; 
    
    /* 3. 確保圖片完整呈現，不被裁切 */
    object-fit: contain; 
    
    background: #EFEBE9; 
    /* 選擇性：如果圖片太大，可以設定一個最大高度防止畫面太長，但這不是必須的 */
    /* max-height: 500px; */ 
  }
  /* --- 👆 修改結束 --- */
  
  .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; text-align: center; }
  .product-title { font-size: 1.2rem; font-weight: bold; color: #4E342E; margin-bottom: 10px; }
  .product-desc { font-size: 0.95rem; color: #8D6E63; margin-bottom: 15px; line-height: 1.6; flex-grow: 1; white-space: pre-wrap; text-align: left; }
  .product-price { font-size: 1.1rem; font-weight: bold; color: #D84315; margin-bottom: 15px; }
  
  .buy-btn {
    background-color: #8D6E63; color: white; border: none; padding: 12px; width: 100%;
    border-radius: 30px; cursor: pointer; font-size: 1rem; text-align: center; text-decoration: none; display: block;
    font-weight: bold; transition: 0.3s;
  }
  .buy-btn:hover { background-color: #6D4C41; }
  
  #loading { text-align: center; font-size: 1.1rem; color: #8D6E63; margin-top: 50px; }
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main>
  <h1>媽媽的手作布包</h1>
  <p class="page-desc">每一塊布料的挑選、每一道車縫，都蘊含著獨一無二的溫度。<br>喜歡都可以直接點擊 LINE 詢問喔！</p>

  <div id="loading">正在去裁縫間把作品搬出來... 🧵</div>
  <div class="product-grid" id="productContainer"></div>
</main>

<div id="footer-placeholder"></div>

<script src="navbar.js"></script>
<script src="footer.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyAK7QVkEFUCWryls-oOFPcA5Z7Zr5PeQAg",
    authDomain: "bagggg-f9088.firebaseapp.com",
    projectId: "bagggg-f9088",
    storageBucket: "bagggg-f9088.firebasestorage.app",
    messagingSenderId: "951657039312",
    appId: "1:951657039312:web:69fd0b25a7b516fb08a5d5"
  };
  
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();

  const container = document.getElementById('productContainer');
  const loading = document.getElementById('loading');

  // 讀取產品資料 (依上架時間新到舊排序)
  db.collection('products').orderBy('createdAt', 'desc').get().then((querySnapshot) => {
    loading.style.display = 'none';
    
    if (querySnapshot.empty) {
      container.innerHTML = '<p style="text-align:center; width:100%; color:#8D6E63;">目前架上還沒有作品，媽媽正在努力趕工中喔！</p>';
      return;
    }

    let productsHtml = ''; // 優化：先組合 HTML 字串

    querySnapshot.forEach((doc) => {
      const p = doc.data();
      productsHtml += `
        <div class="product-card">
          <img src="${p.imageUrl}" alt="${p.name}" class="product-img" loading="lazy">
          <div class="product-info">
            <div class="product-title">${p.name}</div>
            <div class="product-desc">${p.description}</div>
            <div class="product-price">NT$ ${p.price}</div>
            <a href="javascript:void(0)" onclick="orderProduct('${p.name}')" class="buy-btn">
               👉 LINE 詢問 / 預留
            </a>
          </div>
        </div>
      `;
    });
    
    // 最後一次性將組合好的 HTML 塞入容器中
    container.innerHTML = productsHtml;

  }).catch((error) => {
    console.error("Firebase 讀取錯誤: ", error);
    loading.innerText = "載入失敗，請檢查網路連線";
  });

  // 點擊按鈕跳轉至 LINE 並帶入預設訊息
  function orderProduct(productName) {
    // ⚠️ 請確認這裡的 LINE ID 是正確的喔！
    var lineId = "@130xhbqv"; 
    var lineBaseUrl = "https://line.me/R/oaMessage/" + lineId + "/?"; 
    var message = "你好，我在網站上看到【" + productName + "】，覺得很喜歡！想詢問這個還有現貨，或是可以幫我客製化訂做嗎？";
    window.open(lineBaseUrl + encodeURIComponent(message));
  }
</script>

</body>
</html>
